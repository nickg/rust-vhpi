name: Run dumper example
on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Final value should correspond to rust-version in Cargo.toml
        toolchain: ["stable", "nightly", "1.82"]
        nvc: ["latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1.15.2
        with:
          toolchain:  ${{ matrix.toolchain }}

      - name: Ensure Bash is available (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command bash -ErrorAction SilentlyContinue)) {
            choco install git -y
          }
          bash --version

      - name: Ensure Bash is available (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          command -v bash
          bash --version

      - uses: nickg/setup-nvc@v1
        with:
          version: ${{ matrix.nvc }}
      - name: Display versions
        shell: bash
        run: |
          cargo -V
          rustc -V
          nvc --version
      - name: Run VHPI+nvc matrix checks
        shell: bash
        run: bash scripts/run_dumper_checks.sh
